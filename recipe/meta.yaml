{% set name = "django-heroku" %}
{% set version = "0.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 6af4bc3ae4a9b55eaad6dbe5164918982d2762661aebc9f83d9fa49f6009514e

build:
  noarch: python
  number: 3
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - dj-database-url >=0.5.0
    - django
    - psycopg2
    - python >={{ python_min }}
    - whitenoise

test:
  imports:
    - django_heroku
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/heroku/django-heroku
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: "This is a Django library for Heroku apps."
  dev_url: https://github.com/heroku/django-heroku

extra:
  recipe-maintainers:
    - mxr-conda
